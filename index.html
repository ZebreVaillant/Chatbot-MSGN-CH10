<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant MSGN — Terminale STMG</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo">🎓</div>
      <div>
        <div class="title">Assistant MSGN</div>
        <div class="subtitle">
          Terminale STMG — Chapitre 11
        </div>
      </div>
    </div>

    <div class="score">
      Score : <span id="score">0</span>/<span id="total">0</span>
    </div>
  </header>

  <main class="container">
    <section class="card">

      <!-- Zone de conversation -->
      <div id="chat" class="chat"></div>

      <!-- Boutons d'actions -->
      <div class="actions" id="actions">
        <button class="pill" data-action="qcm">📝 QCM progressif</button>
        <button class="pill" data-action="case">📁 Étude de cas (Darty)</button>
        <button class="pill" data-action="cours">📚 Revoir une notion</button>
        <button class="pill" data-action="bilan">📊 Bilan de session</button>
      </div>

      <!-- Zone de saisie -->
      <div class="inputRow">
        <input 
          id="input" 
          type="text" 
          placeholder="Écris ici (ou utilise les boutons)…"
          autocomplete="off"
        />
        <button id="send" class="send">Envoyer</button>
      </div>

    </section>
  </main>

  <!-- Script principal -->
  <script src="app.js"></script>

</body>
</html>
